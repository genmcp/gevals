kind: Agent
metadata:
  name: "gemini"
commands:
  useVirtualHome: false
  argTemplateMcpServer: "{{ .File }}"
  argTemplateAllowedTools: "{{ .ToolName }}"
  allowedToolsJoinSeparator: ","
  runPrompt: |-
    examples/kube-mcp-server/gemini/gemini-agent-wrapper.sh {{ .McpServerFileArgs }} "{{ .AllowedToolArgs }}" "{{ .Prompt }}"
